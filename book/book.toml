# mdBook configuration for the Narrative Feature Extraction documentation site.
# Build:  python3 tools/build_book.py && mdbook build book
# The src/ directory is fully generated by tools/build_book.py (do not edit by hand).

[book]
title = "Narrative Feature Extraction"
authors = ["Tor Wager Lab"]
description = "Computational annotation of movies and stories: scoping review, annotation format, pipeline, corpus, and review paper."
language = "en"
src = "src"

[output.html]
default-theme = "light"
preferred-dark-theme = "navy"
smart-punctuation = true
# GitHub Pages project site: https://canlab.github.io/narrative_feature_annotations/
# site-url makes the custom 404 page and any absolute links resolve under the subpath.
site-url = "/narrative_feature_annotations/"

[output.html.fold]
enable = true
level = 1

[output.html.search]
enable = true
limit-results = 30
